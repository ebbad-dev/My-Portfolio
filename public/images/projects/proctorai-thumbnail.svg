<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">ProctorAI dashboard thumbnail</title>
  <desc id="desc">A stylized exam monitoring dashboard with webcam scan, risk score, evidence timeline, and review queue.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
